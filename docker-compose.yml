# One-command local reproduction of the Phase 6 demo, per ADR-018.
#   docker compose up          -> both services
#   docker compose up app      -> just the Gradio demo
#   docker compose up api      -> just the FastAPI service
#
# Secrets come from a local .env (cp .env.example .env, fill GROQ_API_KEY).
# They are never baked into the image. GROQ_API_KEY is optional: without it both
# services still start (API /health reports model status; Gradio serves cached
# presets and gates only live-RAG custom questions).

services:
  api:
    build: .
    image: rag-hallucination-detector:local   # built here, reused by `app`
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - hf-cache:/hf-cache                     # persist model downloads across restarts

  app:
    image: rag-hallucination-detector:local    # reuse the image built by `api`
    depends_on:
      - api
    command: python app/app.py
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0             # bind externally (no code change to app.py)
      - GRADIO_SERVER_PORT=7860
    ports:
      - "7860:7860"
    env_file: .env
    volumes:
      - hf-cache:/hf-cache

volumes:
  hf-cache:
